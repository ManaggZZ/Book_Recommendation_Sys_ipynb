<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<style>
    .text-white{
        color: white;
    }
</style>
<body style="background-color: black;">

    <!-- <nav class="navbar" style="background-color:#00a65a">
        <a class="navbar-brand">My Book recommender</a>
        <ul class="nav navbar-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/recommend">Recommend</a></li>
            <li><a>Contact</a></li>
        </ul>
    </nav> -->

    <nav class="navbar" style="background-color:#00a65a">
        <div class="container-fluid">
            <a class="navbar-brand">My Book recommender</a>
            
            <ul class="navbar-nav flex-row ms-auto">
                <li class="nav-item me-3"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item me-3"><a class="nav-link" href="/recommend">Recommend</a></li>
                <li class="nav-item"><a class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:50px">Top 50 Books</h1>
            </div>

            <!-- jinja template  -->
            {% for i in range(book_name|length) %}
                <div class="col-md-3" style="margin-top:50px">
                    <div class="card">
                        <div class="card-body">
                            <img class="card-img-top" src="{{ image[i] }}">
                            <h2>{{ book_name[i] }}</h2> <!-- he added a class here to make text white class="text-white"-->
                            <h4>{{ author[i] }}</4>
                            <h4>Votes: {{ votes[i] }}</h4>
                            <h4>Rating: {{ rating[i]|round(1) }}</h4>
                        </div>
                    </div>
                </div>
            {% endfor %}

            

           

        </div>
    </div>

</body>
</html>
