<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<style>
    
    body {
        background-color: #121212;
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    .navbar {
        background: linear-gradient(90deg, #00c853, #009624);
    }

    .card {
        height: 100%;
        background-color: #1e1e1e;
        border: none;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .card-img-top {
        height: 300px;
        object-fit: contain;
        background-color: #111;
        padding: 10px;
    }

    .card-body {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
    }

    .book-title {
        font-size: 15px;
        font-weight: 600;
        min-height: 40px;
        color: aliceblue;
    }

    .book-author {
        font-size: 13px;
        color: #bbb;
        margin-bottom: 6px;
    }

    .book-meta {
        font-size: 13px;
        color: #ddd;
    }

    .container h1 {
        margin-top: 30px;
        font-weight: 700;
    }

</style>
<body style="background-color: black;">

    <!-- <nav class="navbar" style="background-color:#00a65a">
        <a class="navbar-brand">My Book recommender</a>
        <ul class="nav navbar-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/recommend">Recommend</a></li>
            <li><a>Contact</a></li>
        </ul>
    </nav> -->

    <nav class="navbar" style="background-color:#00a65a">
        <div class="container-fluid">
            <a class="navbar-brand">My Book recommender</a>
            
            <ul class="navbar-nav flex-row ms-auto">
                <li class="nav-item me-3"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item me-3"><a class="nav-link" href="/recommend">Recommend</a></li>
                <li class="nav-item"><a class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:50px">Recommended Books</h1>
                <form action="/recommend_book" method="post">
                    <input name="user_input" type="text" class="form-control">
                    <input type="submit" class="btn btn-lg btn-warning">
                </form>
            </div>

            <div class="col-lg-3 col-md-4 col-sm-6 mt-4 d-flex">
                <div class="card w-100">
                    
                    <img class="card-img-top" src="https://m.media-amazon.com/images/I/71f6DRbcrsL._AC_UY327_FMwebp_QL65_.jpg">

                    <div class="card-body">
                        <div>
                            <div class="book-title">
                                ABC
                            </div>

                            <div class="book-author">
                                XYZ
                            </div>
                        </div>

                        <div class="book-meta">
                            ⭐ 1 <br>
                            👥 1 votes
                        </div>
                    </div>

                </div>
            </div>

            

            

           

        </div>
    </div>

</body>
</html>
